<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Orphan`s City Loading Screen Pro Verisa</title>
    <style>
        html {
            width: 100%;
            height: 100%;
        }

        @font-face {
            font-family: "KasanSansBlack";
            src: url("5KASANSDESIGN-BLACK.B3C89036821EFF6F.TTF") format("truetype");
            font-display: swap;
        }

        @font-face {
            font-family: "KasanSansSemiBold";
            src: url("5KASANSDESIGN-SEMIBOLD.96142A7EF7399CA2.TTF") format("truetype");
            font-display: swap;
        }

        :root {
            --bg: #05070a;
            --panel: rgba(7, 11, 16, 0.64);
            --panel-border: rgba(255, 255, 255, 0.12);
            --text-main: #f4f7fb;
            --text-soft: rgba(244, 247, 251, 0.72);
            --text-dim: rgba(244, 247, 251, 0.48);
            --accent: #83f0bd;
            --accent-soft: rgba(131, 240, 189, 0.24);
            --danger: rgba(0, 0, 0, 0.72);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: relative;
            font-family: "KasanSansSemiBold", Arial, sans-serif;
            color: var(--text-main);
        }

        .map-container {
            width: 100%;
            height: 100%;
            position: relative;
            isolation: isolate;
        }

        .background-image {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            opacity: 0;
            transition: opacity 1.2s ease;
            will-change: opacity;
        }

        .background-image.is-visible {
            opacity: 1;
        }

        .center-panel {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .hero-meta {
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            margin-top: -110px;
            text-align: center;
            padding: 0 20px;
        }

        .top-logo {
            position: absolute;
            top: 35%;
            left: 50%;
            width: 260px;
            height: auto;
            max-width: 60%;
            margin-left: -130px;
            margin-top: -250px;
        }

        .server-title {
            font-family: "KasanSansBlack", Arial, sans-serif;
            font-size: 64px;
            line-height: 0.95;
            font-weight: 900;
            letter-spacing: -0.04em;
            text-align: center;
            text-shadow: 0 10px 30px rgba(0, 0, 0, 0.45);
        }

        .mode-line {
            margin-top: 16px;
            font-size: 22px;
            color: var(--text-main);
            letter-spacing: 0.02em;
            text-align: center;
            text-shadow: 0 10px 24px rgba(0, 0, 0, 0.34);
        }

        .download-feed {
            position: absolute;
            top: 44%;
            left: 50%;
            width: 720px;
            max-width: 90%;
            height: 360px;
            margin-left: -360px;
            margin-top: 60px;
            overflow: hidden;
        }

        .feed-row {
            position: absolute;
            left: 0;
            right: 0;
            display: grid;
            grid-template-columns: 1fr;
            align-items: center;
            justify-items: center;
            gap: 4px;
            padding: 6px 0;
            transition: none;
        }

        .feed-dot {
            display: none;
        }

        .feed-name {
            font-family: "KasanSansSemiBold", Arial, sans-serif;
            min-width: 0;
            font-size: 18px;
            color: var(--text-main);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            letter-spacing: 0.01em;
            text-align: center;
            text-shadow: 0 6px 18px rgba(0, 0, 0, 0.45);
        }

        .feed-state {
            font-family: "KasanSansSemiBold", Arial, sans-serif;
            font-size: 13px;
            color: var(--text-soft);
            white-space: nowrap;
            text-align: center;
            text-shadow: 0 6px 18px rgba(0, 0, 0, 0.45);
        }

        .fallback {
            color: white;
            font-size: 24px;
            background: var(--danger);
            padding: 20px;
            text-align: center;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
        }

        @media (max-width: 700px) {
            .top-logo {
                width: 200px;
                max-width: 70%;
                margin-left: -100px;
                margin-top: -210px;
            }

            .hero-meta {
                margin-top: -90px;
                padding: 0 12px;
            }

            .server-title {
                font-size: 40px;
            }

            .mode-line {
                font-size: 18px;
            }

            .download-feed {
                width: 90%;
                height: 260px;
                margin-left: -45%;
                margin-top: 50px;
            }
        }
    </style>
</head>
<body>
    <div class="map-container" id="mapContainer">
        <img
            id="backgroundImageA"
            class="background-image is-visible"
            alt="Background screenshot"
        >
        <img
            id="backgroundImageB"
            class="background-image"
            alt="Background screenshot"
        >

        <section class="center-panel">
            <img
                src="logo/logo.png"
                class="top-logo"
                alt="Logo"
                onerror="this.style.display='none'"
            >
            <div class="hero-meta">
                <h1 class="server-title" id="serverName">Connecting to server</h1>
                <div class="mode-line" id="statusLine">Preparing server files...</div>
            </div>
            <div class="download-feed" id="downloadFeed"></div>
        </section>

        <div class="fallback" id="fallbackMessage" style="display: none;"></div>
    </div>
    <audio id="backgroundMusic" preload="auto" autoplay loop>
        <source src="" type="audio/wav">
    </audio>

    <script>
        const MAX_VISIBLE_ROWS = 10;
        const FEED_ROW_STEP = 46;
        const DEBUG_ANIMATION = new URLSearchParams(window.location.search).get("debug") === "1";
        const DOWNLOAD_ACTIVE_LABEL = "Downloading";
        const DOWNLOAD_DONE_LABEL = "Downloaded";
        const STATUS_DONE_LABEL = "Step complete";
        const VERIFY_DONE_LABEL = "Already on client";
        const STATUS_ACTIVE_LABEL = "In progress";
        const BACKGROUND_ROTATION_INTERVAL = 5000;
        const BACKGROUND_MUSIC_FILE = "";
        const SCREENSHOT_FILES = [
            "screenshotes/1.png",
            "screenshotes/2.png",
            "screenshotes/3.png",
            "screenshotes/4.png",
            "screenshotes/5.png",
            "screenshotes/6.png",
            "screenshotes/7.png",
            "screenshotes/8.png",
            "screenshotes/9.png",
            "screenshotes/10.png",
            "screenshotes/11.png",
            "screenshotes/12.png",
            "screenshotes/13.png",
            "screenshotes/14.png",
            "screenshotes/15.png",
            "screenshotes/16.png",
            "screenshotes/17.png",
            "screenshotes/18.png",
            "screenshotes/19.png",
            "screenshotes/giphy.gif",
            "screenshotes/aboba.gif",
        ];

        const loadingState = {
            serverName: "Orphan`s City",
            filesTotal: null,
            filesNeeded: null,
            currentStatus: "",
            currentMapName: null,
            nextEntryId: 1,
            activeEntry: null,
            completedDownloads: [],
            rowElements: new Map(),
            debugTimer: null,
            debugPendingTimeout: null,
            screenshotTimer: null,
            screenshotQueue: [],
            currentScreenshot: "",
            activeBackgroundLayer: "A",
            musicUnlockBound: false
        };

        function normalizeMapName(mapName) {
            if (!mapName) {
                return "";
            }

            return decodeURIComponent(String(mapName))
                .trim()
                .replace(/\\/g, "/")
                .split("/")
                .pop()
                .replace(/\.(bsp|png|jpg|jpeg)$/i, "")
                .toLowerCase();
        }

        function getMapNameFromUrl() {
            try {
                const params = new URLSearchParams(window.location.search);

                return normalizeMapName(
                    params.get("map") ||
                    params.get("Map") ||
                    params.get("mapname") ||
                    params.get("MapName")
                );
            }
            catch (error) {
                return "";
            }
        }

        function buildScreenshotQueue() {
            const queue = SCREENSHOT_FILES.slice();

            for (let index = queue.length - 1; index > 0; index -= 1) {
                const randomIndex = Math.floor(Math.random() * (index + 1));
                const temp = queue[index];

                queue[index] = queue[randomIndex];
                queue[randomIndex] = temp;
            }

            if (queue.length > 1 && queue[0] === loadingState.currentScreenshot) {
                const firstAlternativeIndex = queue.findIndex((file) => file !== loadingState.currentScreenshot);

                if (firstAlternativeIndex > 0) {
                    const temp = queue[0];
                    queue[0] = queue[firstAlternativeIndex];
                    queue[firstAlternativeIndex] = temp;
                }
            }

            return queue;
        }

        function getNextScreenshot() {
            if (!SCREENSHOT_FILES.length) {
                return "";
            }

            if (!loadingState.screenshotQueue.length) {
                loadingState.screenshotQueue = buildScreenshotQueue();
            }

            return loadingState.screenshotQueue.shift() || "";
        }

        function showScreenshot(src) {
            const fallbackMessage = document.getElementById("fallbackMessage");
            const backgroundImageA = document.getElementById("backgroundImageA");
            const backgroundImageB = document.getElementById("backgroundImageB");
            const activeImage = loadingState.activeBackgroundLayer === "A" ? backgroundImageA : backgroundImageB;
            const nextImage = loadingState.activeBackgroundLayer === "A" ? backgroundImageB : backgroundImageA;

            if (!src) {
                fallbackMessage.textContent = "No screenshots found in screenshotes";
                fallbackMessage.style.display = "block";
                return;
            }

            const preloadImage = new Image();

            preloadImage.onload = () => {
                nextImage.src = src;
                nextImage.classList.add("is-visible");
                activeImage.classList.remove("is-visible");
                loadingState.activeBackgroundLayer = loadingState.activeBackgroundLayer === "A" ? "B" : "A";
                loadingState.currentScreenshot = src;
                fallbackMessage.style.display = "none";
            };

            preloadImage.onerror = () => {
                fallbackMessage.textContent = `Failed to load screenshot: ${src}`;
                fallbackMessage.style.display = "block";
            };

            preloadImage.src = src;
        }

        function rotateBackgroundScreenshot() {
            showScreenshot(getNextScreenshot());
        }

        function startBackgroundRotation() {
            rotateBackgroundScreenshot();

            if (loadingState.screenshotTimer) {
                clearInterval(loadingState.screenshotTimer);
            }

            loadingState.screenshotTimer = setInterval(() => {
                rotateBackgroundScreenshot();
            }, BACKGROUND_ROTATION_INTERVAL);
        }

        function startBackgroundMusic() {
            const audio = document.getElementById("backgroundMusic");

            if (!audio) {
                return;
            }

            audio.src = BACKGROUND_MUSIC_FILE;
            audio.volume = 1;

            const playPromise = audio.play();

            if (!playPromise || typeof playPromise.then !== "function") {
                return;
            }

            playPromise.catch(() => {
                if (loadingState.musicUnlockBound) {
                    return;
                }

                const unlockAudio = () => {
                    audio.play().catch(() => {});
                    window.removeEventListener("pointerdown", unlockAudio);
                    window.removeEventListener("keydown", unlockAudio);
                    loadingState.musicUnlockBound = false;
                };

                loadingState.musicUnlockBound = true;
                window.addEventListener("pointerdown", unlockAudio, { once: true });
                window.addEventListener("keydown", unlockAudio, { once: true });
            });
        }

        function formatFileName(fileName) {
            if (!fileName) {
                return "Waiting for next file";
            }

            const normalized = String(fileName).replace(/\\/g, "/");
            const parts = normalized.split("/").filter(Boolean);

            if (!parts.length) {
                return normalized;
            }

            if (parts.length === 1) {
                return parts[0];
            }

            return `${parts[parts.length - 1]}  |  ${parts.slice(0, -1).join("/")}`;
        }

        function parseCount(value) {
            const parsedValue = Number(value);

            if (!Number.isFinite(parsedValue)) {
                return null;
            }

            return Math.max(0, Math.floor(parsedValue));
        }

        function createFeedEntry(name, state, active, kind) {
            return {
                id: loadingState.nextEntryId++,
                name,
                state,
                active: Boolean(active),
                kind: kind || "generic"
            };
        }

        function pushCompletedEntry(name, state) {
            loadingState.completedDownloads.unshift(createFeedEntry(name, state, false, "generic"));
            loadingState.completedDownloads = loadingState.completedDownloads.slice(0, MAX_VISIBLE_ROWS + 6);
        }

        function insertCompletedEntry(entry) {
            loadingState.completedDownloads.unshift(entry);
            loadingState.completedDownloads = loadingState.completedDownloads.slice(0, MAX_VISIBLE_ROWS + 6);
        }

        function finalizeActiveDownload(doneLabel) {
            if (!loadingState.activeEntry) {
                return false;
            }

            loadingState.activeEntry.active = false;
            loadingState.activeEntry.state = doneLabel || (
                loadingState.activeEntry.kind === "status"
                    ? STATUS_DONE_LABEL
                    : DOWNLOAD_DONE_LABEL
            );
            insertCompletedEntry(loadingState.activeEntry);
            loadingState.activeEntry = null;
            return true;
        }

        function getProcessedFiles() {
            if (typeof loadingState.filesTotal !== "number" || typeof loadingState.filesNeeded !== "number") {
                return null;
            }

            return Math.max(0, loadingState.filesTotal - loadingState.filesNeeded);
        }

        function getProgressText() {
            const processedFiles = getProcessedFiles();

            if (processedFiles !== null && loadingState.filesTotal > 0) {
                return `${processedFiles}/${loadingState.filesTotal} processed`;
            }

            if (typeof loadingState.filesNeeded === "number") {
                return `${loadingState.filesNeeded} left`;
            }

            return STATUS_ACTIVE_LABEL;
        }

        function getStatusLineText() {
            if (loadingState.currentMapName) {
                return loadingState.currentMapName;
            }

            if (DEBUG_ANIMATION) {
                return "debug animation mode";
            }

            return "current map loading...";
        }

        function getStatusEntry() {
            if (loadingState.activeEntry) {
                return null;
            }

            if (typeof loadingState.filesNeeded === "number" || typeof loadingState.filesTotal === "number") {
                return {
                    id: "status-entry",
                    name: "Checking server content",
                    state: getProgressText(),
                    active: true
                };
            }

            if (DEBUG_ANIMATION) {
                return {
                    id: "status-entry",
                    name: "Debug animation idle",
                    state: "waiting",
                    active: true
                };
            }

            return null;
        }

        function getVisibleEntries() {
            const entries = [];
            const statusEntry = getStatusEntry();

            if (loadingState.activeEntry) {
                entries.push(loadingState.activeEntry);
            }

            if (statusEntry) {
                entries.push(statusEntry);
            }

            loadingState.completedDownloads.forEach((entry) => {
                entries.push(entry);
            });

            return entries.slice(0, MAX_VISIBLE_ROWS);
        }

        function getRowMetrics(index, active) {
            const opacity = Math.max(0, 1 - index * 0.12);
            const blur = Math.min(index * 0.24, 2.4);
            const scale = Math.max(0.9, 1 - index * 0.015);
            const y = index * FEED_ROW_STEP;

            return {
                opacity: active ? Math.max(opacity, 0.95) : opacity,
                blur,
                y,
                scale
            };
        }

        function getOrCreateRow(key, feed) {
            let row = loadingState.rowElements.get(key);

            if (row) {
                return row;
            }

            row = document.createElement("div");
            row.className = "feed-row";

            const name = document.createElement("div");
            name.className = "feed-name";

            const state = document.createElement("div");
            state.className = "feed-state";

            row.appendChild(name);
            row.appendChild(state);

            loadingState.rowElements.set(key, row);
            feed.appendChild(row);

            return row;
        }

        function renderOverview() {
            document.getElementById("serverName").textContent = loadingState.serverName;
            document.getElementById("statusLine").textContent = getStatusLineText();
        }

        function renderFeed() {
            const feed = document.getElementById("downloadFeed");
            const visibleEntries = getVisibleEntries();

            if (!visibleEntries.length) {
                const emptyKey = "__empty__";
                let emptyRow = loadingState.rowElements.get(emptyKey);

                if (!emptyRow) {
                    emptyRow = document.createElement("div");
                    emptyRow.className = "feed-row";
                    emptyRow.innerHTML = `
                        <div class="feed-name">Waiting for first server file...</div>
                        <div class="feed-state">(standby)</div>
                    `;
                    loadingState.rowElements.set(emptyKey, emptyRow);
                    feed.appendChild(emptyRow);
                }

                emptyRow.style.opacity = "1";
                emptyRow.style.transform = "translateY(0px) scale(1)";
                emptyRow.style.filter = "blur(0px)";
                emptyRow.style.pointerEvents = "none";

                loadingState.rowElements.forEach((row, key) => {
                    if (key !== emptyKey) {
                        row.remove();
                        loadingState.rowElements.delete(key);
                    }
                });

                return;
            }

            const nextKeys = new Set();

            const emptyRow = loadingState.rowElements.get("__empty__");

            if (emptyRow) {
                emptyRow.remove();
                loadingState.rowElements.delete("__empty__");
            }

            visibleEntries.forEach((entry, index) => {
                const rowKey = String(entry.id);
                const metrics = getRowMetrics(index, entry.active);
                const row = getOrCreateRow(rowKey, feed);

                nextKeys.add(rowKey);
                row.children[0].textContent = formatFileName(entry.name);
                row.children[1].textContent = `(${entry.state})`;
                row.style.opacity = String(metrics.opacity);
                row.style.filter = `blur(${metrics.blur}px)`;
                row.style.transform = `translateY(${metrics.y}px) scale(${metrics.scale})`;
            });

            const keysToRemove = [];

            loadingState.rowElements.forEach((row, key) => {
                if (!nextKeys.has(key)) {
                    keysToRemove.push(key);
                }
            });

            keysToRemove.forEach((key) => {
                const row = loadingState.rowElements.get(key);
                if (row) {
                    row.remove();
                    loadingState.rowElements.delete(key);
                }
            });
        }

        function renderLoadingScreen() {
            renderOverview();
            renderFeed();
        }

        window.GameDetails = function(servername, serverurl, mapname, maxplayers, steamid, gamemode, volume, language) {
            loadingState.serverName = servername || "Connecting to server";
            loadingState.currentMapName = normalizeMapName(mapname || getMapNameFromUrl());
            renderLoadingScreen();
        };

        window.SetFilesTotal = function(total) {
            loadingState.filesTotal = parseCount(total);
            renderLoadingScreen();
        };

        window.SetFilesNeeded = function(needed) {
            const previousNeeded = loadingState.filesNeeded;
            const nextNeeded = parseCount(needed);
            let processedDelta = 0;

            loadingState.filesNeeded = nextNeeded;

            if (typeof previousNeeded === "number" && typeof nextNeeded === "number" && nextNeeded < previousNeeded) {
                processedDelta = previousNeeded - nextNeeded;
            }

            if (processedDelta > 0 && loadingState.activeEntry && loadingState.activeEntry.kind === "file") {
                finalizeActiveDownload(DOWNLOAD_DONE_LABEL);
                processedDelta -= 1;
            }

            if (processedDelta > 0) {
                const verifiedName = processedDelta === 1
                    ? "Validated cached server file"
                    : `Validated ${processedDelta} cached server files`;

                pushCompletedEntry(verifiedName, VERIFY_DONE_LABEL);
            }

            if (loadingState.filesNeeded === 0) {
                finalizeActiveDownload(DOWNLOAD_DONE_LABEL);
            }

            renderLoadingScreen();
        };

        window.DownloadingFile = function(fileName) {
            if (loadingState.activeEntry) {
                finalizeActiveDownload(
                    loadingState.activeEntry.kind === "status"
                        ? STATUS_DONE_LABEL
                        : DOWNLOAD_DONE_LABEL
                );
            }

            loadingState.activeEntry = createFeedEntry(
                fileName || "Unknown file",
                DOWNLOAD_ACTIVE_LABEL,
                true,
                "file"
            );
            renderLoadingScreen();
        };

        window.SetStatusChanged = function(status) {
            const nextStatus = String(status || "").trim();

            if (!nextStatus) {
                renderLoadingScreen();
                return;
            }

            if (nextStatus === loadingState.currentStatus && loadingState.activeEntry && loadingState.activeEntry.kind === "status") {
                renderLoadingScreen();
                return;
            }

            loadingState.currentStatus = nextStatus;

            const normalizedStatus = loadingState.currentStatus.toLowerCase();
            const shouldCloseCurrentDownload =
                normalizedStatus.includes("sending client info") ||
                normalizedStatus.includes("requesting lua files") ||
                normalizedStatus.includes("receiving lua files") ||
                normalizedStatus.includes("mounting addons") ||
                normalizedStatus.includes("starting lua");

            if (loadingState.activeEntry && loadingState.activeEntry.kind === "status") {
                finalizeActiveDownload(STATUS_DONE_LABEL);
            }

            if (shouldCloseCurrentDownload && loadingState.activeEntry && loadingState.activeEntry.kind === "file") {
                finalizeActiveDownload(DOWNLOAD_DONE_LABEL);
            }

            if (!shouldCloseCurrentDownload && (!loadingState.activeEntry || loadingState.activeEntry.kind !== "file")) {
                loadingState.activeEntry = createFeedEntry(
                    loadingState.currentStatus,
                    STATUS_ACTIVE_LABEL,
                    true,
                    "status"
                );
            }

            renderLoadingScreen();
        };

        function startDebugAnimation() {
            if (!DEBUG_ANIMATION || loadingState.debugTimer) {
                return;
            }

            let debugIndex = 1;
            let remaining = 14;

            loadingState.serverName = "Debug Loading Screen";
            loadingState.currentStatus = "Debug animation";
            loadingState.filesTotal = remaining;
            loadingState.filesNeeded = remaining;

            loadingState.debugTimer = setInterval(() => {
                const fileLabel = `Loading ${debugIndex}`;

                window.DownloadingFile(fileLabel);

                clearTimeout(loadingState.debugPendingTimeout);
                loadingState.debugPendingTimeout = setTimeout(() => {
                    remaining = Math.max(0, remaining - 1);
                    window.SetFilesNeeded(remaining);

                    if (remaining === 0) {
                        clearInterval(loadingState.debugTimer);
                        loadingState.debugTimer = null;

                        setTimeout(() => {
                            loadingState.completedDownloads = [];
                            loadingState.activeEntry = null;
                            loadingState.filesTotal = 14;
                            loadingState.filesNeeded = 14;
                            loadingState.currentStatus = "Debug animation restart";
                            renderLoadingScreen();
                            startDebugAnimation();
                        }, 1200);
                    }
                }, 560);

                debugIndex += 1;
            }, 980);

            renderLoadingScreen();
        }

        loadingState.currentMapName = getMapNameFromUrl();
        startBackgroundRotation();
        startBackgroundMusic();
        renderLoadingScreen();
        startDebugAnimation();
    </script>
</body>
</html>

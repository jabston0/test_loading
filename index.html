<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Orphan`s City Loading Screen Pro Verisa</title>
    <style>
        @font-face {
            font-family: "KasanSansBlack";
            src: url("5KASANSDESIGN-BLACK.B3C89036821EFF6F.TTF") format("truetype");
            font-display: swap;
        }

        @font-face {
            font-family: "KasanSansSemiBold";
            src: url("5KASANSDESIGN-SEMIBOLD.96142A7EF7399CA2.TTF") format("truetype");
            font-display: swap;
        }

        :root {
            --bg: #05070a;
            --panel: rgba(7, 11, 16, 0.64);
            --panel-border: rgba(255, 255, 255, 0.12);
            --text-main: #f4f7fb;
            --text-soft: rgba(244, 247, 251, 0.72);
            --text-dim: rgba(244, 247, 251, 0.48);
            --accent: #83f0bd;
            --accent-soft: rgba(131, 240, 189, 0.24);
            --danger: rgba(0, 0, 0, 0.72);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            position: relative;
            font-family: "KasanSansSemiBold", Arial, sans-serif;
            color: var(--text-main);
        }

        .map-container {
            width: 100%;
            height: 100%;
            position: relative;
            isolation: isolate;
        }

        .background-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .top-logo {
            position: absolute;
            top: 90px;
            left: 50%;
            transform: translateX(-50%);
            width: min(420px, calc(100vw - 40px));
            max-height: 170px;
            object-fit: contain;
            z-index: 2;
        }

        .center-panel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -42%);
            width: min(860px, calc(100vw - 36px));
            padding: 18px 18px 0;
            z-index: 1;
        }

        .server-title {
            font-family: "KasanSansBlack", Arial, sans-serif;
            font-size: clamp(34px, 4.8vw, 68px);
            line-height: 0.95;
            font-weight: 900;
            letter-spacing: -0.04em;
            text-wrap: balance;
            text-align: center;
            text-shadow: 0 10px 30px rgba(0, 0, 0, 0.45);
        }

        .mode-line {
            margin-top: 14px;
            font-size: clamp(16px, 2vw, 22px);
            color: var(--accent);
            letter-spacing: 0.02em;
            text-align: center;
            text-shadow: 0 10px 24px rgba(0, 0, 0, 0.34);
        }

        .download-feed {
            margin-top: 34px;
            display: grid;
            gap: 10px;
        }

        .feed-row {
            display: grid;
            grid-template-columns: 1fr;
            align-items: center;
            justify-items: center;
            gap: 4px;
            padding: 6px 0;
            transform: translateY(0);
            transition: opacity 260ms ease, transform 260ms ease;
        }

        .feed-dot {
            display: none;
        }

        .feed-name {
            font-family: "KasanSansSemiBold", Arial, sans-serif;
            min-width: 0;
            font-size: 18px;
            color: var(--text-main);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            letter-spacing: 0.01em;
            text-align: center;
            text-shadow: 0 6px 18px rgba(0, 0, 0, 0.45);
        }

        .feed-state {
            font-family: "KasanSansSemiBold", Arial, sans-serif;
            font-size: 13px;
            color: var(--text-soft);
            white-space: nowrap;
            text-align: center;
            text-shadow: 0 6px 18px rgba(0, 0, 0, 0.45);
        }

        .fallback {
            color: white;
            font-size: 24px;
            background: var(--danger);
            padding: 20px;
            text-align: center;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
        }

        @media (max-width: 700px) {
            .top-logo {
                top: 18px;
                width: min(320px, calc(100vw - 28px));
                max-height: 120px;
            }

            .center-panel {
                transform: translate(-50%, -36%);
                padding: 22px 10px 0;
            }
        }
    </style>
</head>
<body>
    <div class="map-container" id="mapContainer">
        <img
            id="backgroundImage"
            class="background-image"
            alt="Map background"
        >
        <img
            src="logo/logo.png"
            class="top-logo"
            alt="Logo"
            onerror="this.style.display='none'"
        >

        <section class="center-panel">
            <h1 class="server-title" id="serverName">Connecting to server</h1>
            <div class="mode-line" id="statusLine">Preparing server files...</div>
            <div class="download-feed" id="downloadFeed"></div>
        </section>

        <div class="fallback" id="fallbackMessage" style="display: none;"></div>
    </div>

    <script>
        const MAX_VISIBLE_ROWS = 10;
        const DOWNLOAD_ACTIVE_LABEL = "Downloading";
        const DOWNLOAD_DONE_LABEL = "Downloaded";
        const VERIFY_ACTIVE_LABEL = "Checking";
        const VERIFY_DONE_LABEL = "Already on client";
        const STATUS_ACTIVE_LABEL = "In progress";

        const loadingState = {
            serverName: "Orphan`s City",
            filesTotal: null,
            filesNeeded: null,
            currentStatus: "",
            currentMapName: null,
            mapImageRequestId: 0,
            activeDownload: null,
            completedDownloads: []
        };

        function normalizeMapName(mapName) {
            if (!mapName) {
                return "";
            }

            return decodeURIComponent(String(mapName))
                .trim()
                .replace(/\\/g, "/")
                .split("/")
                .pop()
                .replace(/\.(bsp|png|jpg|jpeg)$/i, "")
                .toLowerCase();
        }

        function getMapNameFromUrl() {
            try {
                const params = new URLSearchParams(window.location.search);

                return normalizeMapName(
                    params.get("map") ||
                    params.get("Map") ||
                    params.get("mapname") ||
                    params.get("MapName")
                );
            }
            catch (error) {
                return "";
            }
        }

        function setMapImage(mapName) {
            const backgroundImage = document.getElementById("backgroundImage");
            const fallbackMessage = document.getElementById("fallbackMessage");
            const normalizedMapName = normalizeMapName(mapName);
            const requestId = ++loadingState.mapImageRequestId;

            if (!normalizedMapName) {
                fallbackMessage.textContent = "No map name";
                fallbackMessage.style.display = "block";
                return;
            }

            loadingState.currentMapName = normalizedMapName;

            const basePath = "maps_ico/";
            const extensions = ["png", "jpg", "jpeg"];
            const fallbackImagePath = `${basePath}gm_construct.png`;
            const primaryImagePaths = extensions.map((ext) => `${basePath}${normalizedMapName}.${ext}?v=${encodeURIComponent(normalizedMapName)}`);
            const imageQueue = [...primaryImagePaths, fallbackImagePath];

            fallbackMessage.style.display = "none";

            function applyImage(src) {
                if (requestId !== loadingState.mapImageRequestId) {
                    return;
                }

                backgroundImage.src = src;
            }

            function tryLoadImage(index) {
                if (requestId !== loadingState.mapImageRequestId) {
                    return;
                }

                if (index >= imageQueue.length) {
                    fallbackMessage.textContent = `Map preview not found: ${normalizedMapName}`;
                    fallbackMessage.style.display = "block";
                    return;
                }

                const src = imageQueue[index];
                const image = new Image();

                image.onload = () => {
                    applyImage(src);
                };

                image.onerror = () => {
                    tryLoadImage(index + 1);
                };

                image.src = src;
            }

            tryLoadImage(0);
        }

        function updateMapImage(mapName) {
            const normalizedMapName = normalizeMapName(mapName);

            if (!normalizedMapName) {
                return;
            }

            if (loadingState.currentMapName === normalizedMapName) {
                return;
            }

            setMapImage(normalizedMapName);
        }

        function formatFileName(fileName) {
            if (!fileName) {
                return "Waiting for next file";
            }

            const normalized = String(fileName).replace(/\\/g, "/");
            const parts = normalized.split("/").filter(Boolean);

            if (!parts.length) {
                return normalized;
            }

            if (parts.length === 1) {
                return parts[0];
            }

            return `${parts[parts.length - 1]}  |  ${parts.slice(0, -1).join("/")}`;
        }

        function parseCount(value) {
            const parsedValue = Number(value);

            if (!Number.isFinite(parsedValue)) {
                return null;
            }

            return Math.max(0, Math.floor(parsedValue));
        }

        function pushCompletedEntry(name, state) {
            loadingState.completedDownloads.unshift({ name, state });
            loadingState.completedDownloads = loadingState.completedDownloads.slice(0, MAX_VISIBLE_ROWS + 6);
        }

        function finalizeActiveDownload(doneLabel) {
            if (!loadingState.activeDownload) {
                return false;
            }

            pushCompletedEntry(
                loadingState.activeDownload.name,
                doneLabel || DOWNLOAD_DONE_LABEL
            );
            loadingState.activeDownload = null;
            return true;
        }

        function getProcessedFiles() {
            if (typeof loadingState.filesTotal !== "number" || typeof loadingState.filesNeeded !== "number") {
                return null;
            }

            return Math.max(0, loadingState.filesTotal - loadingState.filesNeeded);
        }

        function getProgressText() {
            const processedFiles = getProcessedFiles();

            if (processedFiles !== null && loadingState.filesTotal > 0) {
                return `${processedFiles}/${loadingState.filesTotal} processed`;
            }

            if (typeof loadingState.filesNeeded === "number") {
                return `${loadingState.filesNeeded} left`;
            }

            return STATUS_ACTIVE_LABEL;
        }

        function getStatusLineText() {
            if (loadingState.activeDownload) {
                return `${DOWNLOAD_ACTIVE_LABEL}: ${formatFileName(loadingState.activeDownload.name)}`;
            }

            if (loadingState.currentStatus) {
                return `${loadingState.currentStatus} - ${getProgressText()}`;
            }

            if (typeof loadingState.filesTotal === "number") {
                if (loadingState.filesTotal === 0) {
                    return "No custom server files detected";
                }

                return `Preparing ${loadingState.filesTotal} server files`;
            }

            return "Preparing server files...";
        }

        function getSyntheticActiveEntry() {
            if (loadingState.activeDownload) {
                return null;
            }

            if (loadingState.currentStatus) {
                return {
                    name: loadingState.currentStatus,
                    state: getProgressText(),
                    active: true
                };
            }

            if (typeof loadingState.filesNeeded === "number" || typeof loadingState.filesTotal === "number") {
                return {
                    name: "Checking server content",
                    state: getProgressText(),
                    active: true
                };
            }

            return null;
        }

        function renderOverview() {
            document.getElementById("serverName").textContent = loadingState.serverName;
            document.getElementById("statusLine").textContent = getStatusLineText();
        }

        function renderFeed() {
            const feed = document.getElementById("downloadFeed");
            const entries = [];

            if (loadingState.activeDownload) {
                entries.push({
                    name: loadingState.activeDownload.name,
                    state: DOWNLOAD_ACTIVE_LABEL,
                    active: true
                });
            }
            else {
                const syntheticActiveEntry = getSyntheticActiveEntry();

                if (syntheticActiveEntry) {
                    entries.push(syntheticActiveEntry);
                }
            }

            loadingState.completedDownloads.forEach((entry) => {
                entries.push({
                    name: entry.name,
                    state: entry.state,
                    active: false
                });
            });

            const visibleEntries = entries.slice(0, MAX_VISIBLE_ROWS);
            feed.innerHTML = "";

            if (!visibleEntries.length) {
                const emptyRow = document.createElement("div");
                emptyRow.className = "feed-row";
                emptyRow.innerHTML = `
                    <div class="feed-name">Waiting for first server file...</div>
                    <div class="feed-state">(standby)</div>
                `;
                feed.appendChild(emptyRow);
                return;
            }

            visibleEntries.forEach((entry, index) => {
                const row = document.createElement("div");
                const fade = Math.max(0.12, 1 - index * 0.1);
                const drift = Math.min(index * 4, 24);

                row.className = `feed-row${entry.active ? " active" : ""}`;
                row.style.opacity = String(fade);
                row.style.transform = `translateY(${drift}px)`;

                const name = document.createElement("div");
                name.className = "feed-name";
                name.textContent = formatFileName(entry.name);

                const state = document.createElement("div");
                state.className = "feed-state";
                state.textContent = `(${entry.state})`;

                row.appendChild(name);
                row.appendChild(state);
                feed.appendChild(row);
            });
        }

        function renderLoadingScreen() {
            renderOverview();
            renderFeed();
        }

        window.GameDetails = function(servername, serverurl, mapname, maxplayers, steamid, gamemode, volume, language) {
            loadingState.serverName = servername || "Connecting to server";
            updateMapImage(mapname || getMapNameFromUrl() || "gm_construct");
            renderLoadingScreen();
        };

        window.SetFilesTotal = function(total) {
            loadingState.filesTotal = parseCount(total);
            renderLoadingScreen();
        };

        window.SetFilesNeeded = function(needed) {
            const previousNeeded = loadingState.filesNeeded;
            const nextNeeded = parseCount(needed);
            let processedDelta = 0;

            loadingState.filesNeeded = nextNeeded;

            if (typeof previousNeeded === "number" && typeof nextNeeded === "number" && nextNeeded < previousNeeded) {
                processedDelta = previousNeeded - nextNeeded;
            }

            if (processedDelta > 0 && loadingState.activeDownload) {
                finalizeActiveDownload(DOWNLOAD_DONE_LABEL);
                processedDelta -= 1;
            }

            if (processedDelta > 0) {
                const verifiedName = processedDelta === 1
                    ? "Validated cached server file"
                    : `Validated ${processedDelta} cached server files`;

                pushCompletedEntry(verifiedName, VERIFY_DONE_LABEL);
            }

            if (loadingState.filesNeeded === 0) {
                finalizeActiveDownload(DOWNLOAD_DONE_LABEL);
            }

            renderLoadingScreen();
        };

        window.DownloadingFile = function(fileName) {
            finalizeActiveDownload();
            loadingState.activeDownload = {
                name: fileName || "Unknown file"
            };
            renderLoadingScreen();
        };

        window.SetStatusChanged = function(status) {
            loadingState.currentStatus = String(status || "").trim();

            const normalizedStatus = loadingState.currentStatus.toLowerCase();
            const shouldCloseCurrentDownload =
                normalizedStatus.includes("sending client info") ||
                normalizedStatus.includes("requesting lua files") ||
                normalizedStatus.includes("receiving lua files") ||
                normalizedStatus.includes("mounting addons") ||
                normalizedStatus.includes("starting lua");

            if (shouldCloseCurrentDownload) {
                finalizeActiveDownload(DOWNLOAD_DONE_LABEL);
            }

            renderLoadingScreen();
        };

        setMapImage(getMapNameFromUrl() || "gm_construct");
        renderLoadingScreen();
    </script>
</body>
</html>

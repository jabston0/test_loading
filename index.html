<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Orphan`s City Loading Screen Pro Verisa</title>
    <style>
        body {
            margin: 0;
            background: #05070a;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .map-container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
        }
        .fallback {
            color: white;
            font-family: monospace;
            font-size: 24px;
            background: rgba(0,0,0,0.7);
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="map-container" id="mapContainer">
        <div class="fallback"></div>
    </div>

    <script>
        function setMapImage(mapName) {
            const container = document.getElementById('mapContainer');
            if (!mapName) {
                container.innerHTML = '<div class="fallback">No map name</div>';
                return;
            }
        
            const basePath = 'maps_ico/';
            const extensions = ['png', 'jpg', 'jpeg'];
            let currentExtIndex = 0;
        
            function tryLoad() {
                if (currentExtIndex >= extensions.length) {
                    container.innerHTML = `<div class="fallback">Map preview not found: ${mapName}</div>`;
                    return;
                }
                const ext = extensions[currentExtIndex];
                const img = new Image();
                img.onload = () => {
                    container.innerHTML = '';
                    container.appendChild(img);
                    img.style.maxWidth = '90%';
                    img.style.maxHeight = '90%';
                    img.style.objectFit = 'contain';
                };
                img.onerror = () => {
                    currentExtIndex++;
                    tryLoad();
                };
                img.src = `${basePath}${mapName}.${ext}`;
            }
        
            tryLoad();
        }

        window.GameDetails = function(servername, serverurl, mapname, maxplayers, steamid, gamemode, volume, language) {
            setMapImage(mapname);
        };

        window.SetFilesTotal = function(total) {};
        window.DownloadingFile = function(fileName) {};
        window.SetStatusChanged = function(status) {};
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Orphan`s City Loading Screen Pro Verisa</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #05070a;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }
        .map-container {
            width: 100%;
            height: 100%;
        }
        img {
            width: 100%;
            height: 100%;
            object-fit: fill;
            display: block;
        }
        .fallback {
            color: white;
            font-family: monospace;
            font-size: 24px;
            background: rgba(0,0,0,0.7);
            padding: 20px;
            text-align: center;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>
    <div class="map-container" id="mapContainer">
        <div class="fallback"></div>
    </div>

    <script>
        function setMapImage(mapName) {
            const container = document.getElementById('mapContainer');
            if (!mapName) {
                container.innerHTML = '<div class="fallback">No map name</div>';
                return;
            }
        
            const basePath = 'maps_ico/';
            const extensions = ['png', 'jpg', 'jpeg'];
            let currentExtIndex = 0;
        
            function tryLoad() {
                if (currentExtIndex >= extensions.length) {
                    container.innerHTML = `<div class="fallback">Map preview not found: ${mapName}</div>`;
                    return;
                }
                const ext = extensions[currentExtIndex];
                const img = new Image();
                img.onload = () => {
                    container.innerHTML = '';
                    container.appendChild(img);
                };
                img.onerror = () => {
                    currentExtIndex++;
                    tryLoad();
                };
                img.src = `${basePath}${mapName}.${ext}`;
            }
        
            tryLoad();
        }

        window.GameDetails = function(servername, serverurl, mapname, maxplayers, steamid, gamemode, volume, language) {
            setMapImage(mapname);
        };

        window.SetFilesTotal = function(total) {};
        window.DownloadingFile = function(fileName) {};
        window.SetStatusChanged = function(status) {};
    </script>
</body>
</html>
